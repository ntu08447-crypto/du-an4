
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: #ffeef5; /* GIỮ NGUYÊN */
    }

    .container {
        max-width: 400px;
        margin: auto;
        background: white; /* GIỮ NGUYÊN */
        border-radius: 0;
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .header {
        position: relative;
    }

    .header img {
        width: 100%;
        height: 180px;
        object-fit: cover;
    }

    .header-text {
        position: absolute;
        bottom: 10px;
        left: 10px;
        color: white;
        font-weight: bold;
        background: rgba(255, 0, 0, 0.7); /* HỒNG -> ĐỎ */
        padding: 8px 12px;
    }

    .menu {
        display: flex;
        justify-content: space-around;
        padding: 10px;
        color: red; /* HỒNG -> ĐỎ */
        font-weight: bold;
    }

    .content {
        display: flex;
        padding: 15px;
        align-items: center;
    }

    .avatar {
        width: 120px;
        height: 140px;
        object-fit: cover;
        border-radius: 0;
        border: 3px solid red; /* HỒNG -> ĐỎ */
        margin-right: 15px;
    }

    .info {
        line-height: 1.8;
        font-size: 14px;
    }

    .footer {
        background: #ff4d4d; /* HỒNG -> ĐỎ */
        text-align: center;
        padding: 15px;
        font-size: 13px;
    }

    .zalo-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: red; /* HỒNG -> ĐỎ */
        color: white;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 20px;
    }
</style>
        
</head>

       ">
        <div class="header-text">
